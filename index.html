<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CapCut Clone UI</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons (Standard in Web Dev) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 1. TOP NAVIGATION -->
        <header class="top-bar">
            <div class="logo-section">
                <i class="fas fa-scissors brand-icon"></i>
                <span class="project-name">Untitled Project</span>
            </div>
            <div class="export-section">
                <button class="btn-secondary">1080p <i class="fas fa-chevron-down"></i></button>
                <button class="btn-primary">Export</button>
            </div>
        </header>

        <div class="workspace">
            <!-- 2. LEFT SIDEBAR (RESOURCES) -->
            <aside class="sidebar-left">
                <nav class="resource-nav">
                    <div class="nav-item active"><i class="fas fa-photo-video"></i><small>Media</small></div>
                    <div class="nav-item"><i class="fas fa-music"></i><small>Audio</small></div>
                    <div class="nav-item"><i class="fas fa-font"></i><small>Text</small></div>
                    <div class="nav-item"><i class="far fa-laugh-beam"></i><small>Stickers</small></div>
                    <div class="nav-item"><i class="fas fa-magic"></i><small>Effects</small></div>
                    <div class="nav-item"><i class="fas fa-random"></i><small>Transitions</small></div>
                    <div class="nav-item"><i class="fas fa-sliders-h"></i><small>Filters</small></div>
                </nav>
                <div class="resource-panel">
                    <div class="panel-header">
                        <h3>Local Media</h3>
                        <i class="fas fa-plus btn-icon"></i>
                    </div>
                    <div class="media-grid">
                        <!-- Mock Media Items -->
                        <div class="media-item" style="background-image: url('https://placehold.co/100x100/222/fff')"><span>00:15</span></div>
                        <div class="media-item" style="background-image: url('https://placehold.co/100x100/333/fff')"><span>00:30</span></div>
                        <div class="media-item" style="background-image: url('https://placehold.co/100x100/444/fff')"><span>01:05</span></div>
                        <div class="media-item" style="background-image: url('https://placehold.co/100x100/555/fff')"><span>00:12</span></div>
                    </div>
                </div>
            </aside>

            <!-- 3. CENTER STAGE (PREVIEW & TIMELINE) -->
            <main class="center-stage">
                <!-- Preview Player -->
                <div class="preview-area">
                    <div class="video-canvas">
                        <div class="placeholder-text">Player Preview</div>
                    </div>
                    <div class="player-controls">
                        <span class="time-code">00:00:04 / 00:01:30</span>
                        <div class="control-buttons">
                            <i class="fas fa-step-backward"></i>
                            <i class="fas fa-play-circle play-btn"></i>
                            <i class="fas fa-step-forward"></i>
                        </div>
                        <div class="zoom-controls">
                            <i class="fas fa-minus"></i>
                            <div class="slider-track"></div>
                            <i class="fas fa-plus"></i>
                        </div>
                    </div>
                </div>

                <!-- Timeline Area -->
                <div class="timeline-area">
                    <div class="timeline-toolbar">
                        <div class="tool-group">
                            <button class="tool-btn" title="Undo"><i class="fas fa-undo"></i></button>
                            <button class="tool-btn" title="Redo"><i class="fas fa-redo"></i></button>
                        </div>
                        <div class="tool-divider"></div>
                        <div class="tool-group">
                            <button class="tool-btn" title="Split (Ctrl+B)"><i class="fas fa-cut"></i> Split</button>
                            <button class="tool-btn" title="Delete Left"><i class="fas fa-indent"></i></button>
                            <button class="tool-btn" title="Delete Right"><i class="fas fa-outdent"></i></button>
                            <button class="tool-btn" title="Delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div class="tool-divider"></div>
                        <div class="tool-group">
                            <button class="tool-btn"><i class="fas fa-snowflake"></i> Freeze</button>
                            <button class="tool-btn"><i class="fas fa-history"></i> Reverse</button>
                        </div>
                    </div>
                    
                    <div class="timeline-tracks">
                        <div class="time-ruler">
                            <span>00:00</span><span>00:15</span><span>00:30</span><span>00:45</span><span>01:00</span>
                        </div>
                        <!-- Video Track -->
                        <div class="track-row">
                            <div class="track-header"><i class="fas fa-video"></i></div>
                            <div class="track-content">
                                <div class="clip video-clip" style="width: 200px; left: 0;">Clip_01.mp4</div>
                                <div class="clip video-clip" style="width: 150px; left: 205px;">Clip_02.mp4</div>
                            </div>
                        </div>
                        <!-- Audio Track -->
                        <div class="track-row">
                            <div class="track-header"><i class="fas fa-volume-up"></i></div>
                            <div class="track-content">
                                <div class="clip audio-clip" style="width: 350px; left: 0;">Background_Music.mp3</div>
                            </div>
                        </div>
                        <div class="playhead"></div>
                    </div>
                </div>
            </main>

            <!-- 4. RIGHT SIDEBAR (PROPERTIES) -->
            <aside class="sidebar-right">
                <div class="property-tabs">
                    <div class="tab active">Video</div>
                    <div class="tab">Audio</div>
                    <div class="tab">Speed</div>
                    <div class="tab">Anim</div>
                </div>
                <div class="property-content">
                    <!-- Transform Group -->
                    <div class="prop-group">
                        <div class="prop-header">
                            <span>Scale</span>
                            <span class="value-display">100%</span>
                        </div>
                        <input type="range" min="0" max="200" value="100" class="prop-slider">
                    </div>
                    <div class="prop-group">
                        <div class="prop-header">
                            <span>Position X</span>
                            <span class="value-display">0</span>
                        </div>
                        <input type="range" min="-500" max="500" value="0" class="prop-slider">
                    </div>
                    <div class="prop-group">
                        <div class="prop-header">
                            <span>Position Y</span>
                            <span class="value-display">0</span>
                        </div>
                        <input type="range" min="-500" max="500" value="0" class="prop-slider">
                    </div>
                    <div class="prop-group">
                        <div class="prop-header">
                            <span>Rotation</span>
                            <span class="value-display">0°</span>
                        </div>
                        <input type="range" min="0" max="360" value="0" class="prop-slider">
                    </div>
                    
                    <!-- Blend Mode Group -->
                    <div class="prop-group border-top">
                        <div class="prop-header">
                            <span>Opacity</span>
                            <span class="value-display">100%</span>
                        </div>
                        <input type="range" min="0" max="100" value="100" class="prop-slider">
                    </div>
                </div>
            </aside>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
