<!-- UPDATE: Replace the .preview-area in the previous HTML with this Active Engine -->
<div class="preview-area">
    <!-- 1. Canvas Container (Holds Video + Text Layers) -->
    <div class="canvas-container" id="canvas-root">
        <video id="main-video" src="" loop playsinline></video>
        
        <!-- Text Layers will be injected here via JS -->
        <div id="overlay-layer"></div>
    </div>

    <!-- 2. Hidden Input for Real File Loading -->
    <input type="file" id="file-upload" accept="video/*" hidden>
    
    <!-- 3. Active Controls -->
    <div class="player-controls">
        <span class="time-code" id="time-display">00:00 / 00:00</span>
        <div class="control-buttons">
            <i class="fas fa-step-backward" onclick="seek(-5)"></i>
            <!-- The ID is crucial for the JS toggle -->
            <i class="fas fa-play-circle play-btn" id="play-toggle"></i>
            <i class="fas fa-step-forward" onclick="seek(5)"></i>
        </div>
        <button class="btn-secondary" onclick="document.getElementById('file-upload').click()">
            <i class="fas fa-upload"></i> Load Video
        </button>
    </div>
</div>
